  <text class="ring"><textPath href="#arcTop" startOffset="50%" text-anchor="middle">PLOMBERIE BOILEAU INC.</textPath></text>
  <text class="sub"><textPath href="#arcBot" startOffset="50%" text-anchor="middle">MONTRÉAL · QUÉBEC</textPath></text>
  <circle cx="25" cy="120" r="2.6" fill="#D99A3D"/>
  <circle cx="215" cy="120" r="2.6" fill="#D99A3D"/>
