<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-labelledby="t d">
  <title id="t">Plomberie Boileau crest</title>
  <desc id="d">Circular spruce-green seal: company name arcs around a brass flame inside a water drop.</desc>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600&amp;display=swap');
    .ring { font-family:'Bricolage Grotesque','Avenir Next','Helvetica Neue',Arial,sans-serif; font-weight:600; font-size:13.5px; letter-spacing:3px; fill:#F2F6F3; }
    .sub  { font-family:'Bricolage Grotesque','Avenir Next','Helvetica Neue',Arial,sans-serif; font-weight:500; font-size:11px; letter-spacing:3.4px; fill:#D99A3D; }
  </style>
  <circle cx="120" cy="120" r="118" fill="#157A55"/>
  <circle cx="120" cy="120" r="110" fill="none" stroke="#0C4A36" stroke-width="1.5"/>
  <circle cx="120" cy="120" r="80" fill="none" stroke="#D99A3D" stroke-width="1.8"/>
  <defs>
    <path id="arcTop" d="M 29 120 A 91 91 0 0 1 211 120"/>
